name: V0 CI

on:
  push:
  pull_request:

jobs:
  verify-v0:
    name: Verify V0 pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Test asset_hotspot workload
        run: python -m pytest tests/workload/test_asset_hotspot.py -q

      - name: Test backend health endpoint
        run: python -m pytest backend/tests/test_health.py -q

      - name: Set up Go 1.26.1
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Test Go executor
        working-directory: executor
        run: go test ./...

      - name: Run V0 end-to-end sanity check
        run: python scripts/v0_sanity.py

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
