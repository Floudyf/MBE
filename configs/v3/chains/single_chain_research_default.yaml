profile_type: chain_profile
profile_id: single_chain_research_default
version: v3
stage: v3.3.1

chain:
  chain_id: research_chain_x
  chain_name: Single-chain Research Default
  role: single_chain
  chain_type: modular_research_chain
  truth_label: modular_runtime

deployment:
  mode: single_process_logical_nodes
  node_count: 4
  validator_count: 4
  executor_count: 4
  hardware_profile: local_dev_default

node:
  node_id_prefix: research_node
  node_roles: [validator, executor, observer]
  clock_mode: logical
  storage_root: .cache/v3_runtime/single_chain_research_default

block:
  block_interval_ms: 100
  max_tx_per_block: 500
  block_cut_policy: time_or_count
  empty_block_enabled: false

consensus:
  domain_count: 1
  plugin: simple_leader
  validator_count: 4
  leader_policy: round_robin
  ordering_policy: by_arrival
  fault_model: none
  config: {}

committee:
  enabled: false
  status: planned
  epoch_enabled: false
  lifecycle_plugin: none

finality:
  finality_type: deterministic
  finality_depth: 1
  finality_timeout_ms: 1000
  commit_rule: ordered_block_commit

tx_pool:
  plugin: fifo_pool
  max_pool_size: 100000
  batch_selection_policy: by_arrival
  dedup_enabled: true
  backpressure_policy: reject

sharding:
  enabled: true
  shard_count: 4
  plugin: hash_sharding
  routing_policy: hash
  cross_shard_policy: local_only

execution:
  plugin: serial_execution
  shard_count: 4
  executor_count: 4
  parallelism: 4
  access_list_enabled: true
  dependency_check_enabled: true
  dual_track_enabled: false

state:
  model: key_value
  backend: memory_kv
  storage_unit_count: 4
  placement_policy: hash_state_storage
  key_count: 100000
  read_set_required: true
  write_set_required: true
  remote_fetch_cost_ms: 1

routing:
  plugin: hash_sharding
  routing_scope: execution_shard

commit:
  plugin: normal_commit
  aggregation_enabled: false
  commit_batch_size: 500
  state_commit_log_enabled: true

network:
  plugin: fixed_delay
  base_delay_ms: 1
  delay_ms: 1
  jitter_ms: 0
  loss_rate: 0
  bandwidth_limit: null

cross_chain:
  cross_chain_enabled: false
  peer_chain_ids: []
  finality_export_enabled: false
  bridge_adapter: none

application:
  chaincode_or_contract: metatrack_asset
  operation_types: [transfer, update, reward]
  asset_model: key_value_asset
  hotspot_model: configurable_hotspot

fault_safety:
  fault_injection_enabled: false
  crash_faults: []
  byzantine_faults: []
  safety_assertions_enabled: true

metrics:
  trace_enabled: true
  report_enabled: true
  mechanism_metrics_enabled: true
  block_log_enabled: true
  tx_results_enabled: true

capability:
  status: planned
  min_stage: v3.3.1
  backend_type: modular_research_chain
  runnable: false
  blocking_reasons:
    - committee and epoch lifecycle remain planned placeholders
