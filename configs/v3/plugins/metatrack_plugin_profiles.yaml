    plugins:
      ShardingPlugin: co_access_sharding
      ExecutionSchedulerPlugin: dual_track_execution
      StateAccessPlugin: access_list_prefetch
      CommitPlugin: normal_commit
    blocking_reasons:
      - requires V3.3 MetaTrack plugin evaluation

  - plugin_profile_id: full_MetaTrack
    domain: metatrack
    status: planned
    min_stage: v3.3
    runnable: false
