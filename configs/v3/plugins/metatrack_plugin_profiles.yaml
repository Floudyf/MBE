profile_type: plugin_profile_collection
version: v3
stage: v3.1
profiles:
  - plugin_profile_id: baseline_hash_only
    domain: metatrack
    status: planned
    min_stage: v3.3
    runnable: false
    description: Hash sharding with serial execution and normal commit.
    plugins:
      ShardingPlugin: hash_sharding
      ExecutionSchedulerPlugin: serial_execution
      StateAccessPlugin: direct_fetch
      CommitPlugin: normal_commit
    blocking_reasons:
      - requires V3.3 MetaTrack plugin evaluation

  - plugin_profile_id: co_access_only
    domain: metatrack
    status: planned
    min_stage: v3.3
    runnable: false
    description: Co-access sharding with serial execution and normal commit.
    plugins:
      ShardingPlugin: co_access_sharding
      ExecutionSchedulerPlugin: serial_execution
      StateAccessPlugin: direct_fetch
      CommitPlugin: normal_commit
    blocking_reasons:
      - requires V3.3 MetaTrack plugin evaluation

  - plugin_profile_id: co_access_dual_track
    domain: metatrack
    status: planned
    min_stage: v3.3
    runnable: false
