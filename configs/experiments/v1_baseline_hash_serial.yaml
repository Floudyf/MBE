experiment:
  name: v1_baseline_hash_serial
  version: v1
  stage: v1.1
  runnable: true
  implemented: true
  description: V1.1 runnable baseline that reuses the V0 serial replay pipeline.
  seed: 42
template: v1_execution_comparison
workload: {plugin: asset_hotspot, tx_count: 10000, zipf_theta: 1.2, hot_key_ratio: 0.05, cross_shard_ratio: 0.2}
trace: {plugin: jsonl_gzip}
runtime: {clock_mode: virtual}
routing: {plugin: hash_routing}
execution: {plugin: serial_execution}
commit: {plugin: normal_commit}
metrics: {plugin: basic_metrics}
output: {dir: experiments/runs/v1_baseline_hash_serial}
