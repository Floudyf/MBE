  - name: fabric_chain_backed_trace
    type: trace_source
    version: v1
    status: runnable
    maturity: experimental
    description: Replay a trace produced by the CLI/WSL Fabric smoke runner; web APIs do not start Fabric.
    requires:
      trace_fields: []
      capabilities: []
    provides:
      capabilities: [trace_replay, access_list, read_set, write_set, commutative_update, update_type, fabric_smoke_source]
