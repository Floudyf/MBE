    reason: Web platform only replays the Fabric smoke trace.
  - name: public_chain_imported_trace
    type: trace_source
    version: v2
    status: experimental
    maturity: experimental
    description: Imported public-chain trace skeleton with semantic_unknown by default.
    requires:
      trace_fields: []
      capabilities: []
    provides:
      capabilities: [trace_replay, semantic_unknown]
    compatible_topologies: [single_chain, dual_chain, cross_chain_replay, multi_chain]
    compatible_trace_sources: [public_chain_imported_trace]
    forbidden_with: []
    metrics: [basic_metrics]
    reason: Imported public-chain traces do not provide reliable access-set, delta, or commutative-update semantics by default.

