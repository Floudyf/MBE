    compatible_trace_sources: [synthetic, existing_trace, fabric_chain_backed_trace, public_chain_imported_trace]
    forbidden_with: []
    metrics: [cross_chain_metrics]
    reason: V2.5 local dual-chain replay engine is implemented for explicit V2.5 sample configs; generic topology preview remains planned.
  - name: cross_chain_replay
