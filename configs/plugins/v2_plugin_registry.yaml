    compatible_topologies: [single_chain, dual_chain, cross_chain_replay, multi_chain]
    compatible_trace_sources: [synthetic]
    forbidden_with: []
    metrics: [basic_metrics, v1_metrics]
    reason: ""
  - name: existing_trace
    type: trace_source
    version: v1
    status: runnable
